<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>콘텐츠 엔진 — 블로그·뉴스레터·전자책·웹툰·SNS</title>
<link rel="stylesheet" href="../../assets/common.css">
<style>
:root{--bg:#fff9fc;--line:#f1dce7;--line-strong:#e8a6c6;--pink:#ef6fab;--purple:#9181ff;--muted:#9a8e94;--pink-soft:#fff5fa;--purple-soft:#f7f4ff}
body{background:var(--bg);margin:0;font-family:'Pretendard Variable','Noto Sans JP',Pretendard,sans-serif;color:#2b2430}
.container{max-width:1180px;margin:0 auto;padding:16px 14px 80px}

.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
  background:#fff;border:1px solid var(--line);border-radius:22px;padding:14px 18px;
  box-shadow:0 8px 20px rgba(126,87,110,.07);margin-bottom:14px}
.brand{display:flex;align-items:center;gap:12px}
.brand-logo{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#ffc0de,#ef6fab 52%,#9181ff);color:#fff;font-weight:900;font-size:20px}
.brand h1{margin:0;font-size:20px}
.brand p{margin:3px 0 0;color:var(--muted);font-size:11px}
.tb-btn{padding:10px 18px;border-radius:999px;border:1px solid var(--line);background:#fff;
  font-weight:800;font-size:12px;cursor:pointer;font-family:inherit;transition:.15s}
.tb-btn:hover{border-color:var(--line-strong)}
.tb-btn.pri{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-color:transparent}

.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:0 6px 18px rgba(126,87,110,.06)}
.panel h3{margin:0 0 10px;font-size:17px;color:#b14d82}
.sec{font-weight:800;font-size:13px;margin:14px 0 8px;color:#b14d82}
.sec:first-child{margin-top:0}
.muted{font-size:12px;color:var(--muted);line-height:1.7}

.ccards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
.ccard{padding:18px 12px;border:2px solid var(--line);border-radius:16px;background:#fff;
  text-align:center;cursor:pointer;transition:.14s;font-family:inherit}
.ccard:hover{border-color:var(--line-strong);transform:translateY(-2px)}
.ccard.on{background:linear-gradient(135deg,var(--pink-soft),var(--purple-soft));border-color:var(--line-strong);box-shadow:0 8px 18px rgba(232,166,198,.18)}
.ccard .ico{font-size:32px;display:block;margin-bottom:4px}
.ccard strong{display:block;font-size:13px;color:#2b2430}
.ccard span{display:block;font-size:10px;color:var(--muted);margin-top:2px}

label{display:block;font-size:12px;font-weight:800;color:#6b5d65;margin-bottom:4px}
.input,.select,.ta{width:100%;padding:11px 13px;border:1px solid #ead9e1;border-radius:12px;
  font-size:13px;font-family:inherit;background:#fff;outline:none}
.input:focus,.select:focus,.ta:focus{border-color:var(--line-strong);box-shadow:0 0 0 3px rgba(239,111,171,.12)}
.ta{min-height:100px;resize:vertical;line-height:1.7}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.btn{padding:10px 16px;border-radius:12px;border:1px solid var(--line);background:#fff;
  font-weight:800;font-size:12px;cursor:pointer;font-family:inherit}
.btn:hover{border-color:var(--line-strong)}
.btn.pri{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border-color:transparent}
.btn.snd{background:#effbf7;border-color:#a8dcc9;color:#1a7a5a}
.btn.sv{background:#eff6ff;border-color:#bcd7f0;color:#1f4a80}

.kojp{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.kojp .col{padding:14px;border-radius:16px;border:1px solid #f2cfe0;background:var(--pink-soft)}
.kojp .jp{background:#f0f4ff;border-color:#d7dffa}
.kojp h4{margin:0 0 8px;font-size:13px;color:#b14d82}
.kojp .jp h4{color:#4a5abf}
.kojp textarea{width:100%;min-height:240px;padding:12px;border:1px solid #ead9e1;border-radius:12px;font-family:inherit;font-size:12px;line-height:1.8;background:#fff;resize:vertical}

.status{font-size:11px;color:var(--muted);min-height:16px;margin-top:8px}

@media (max-width:820px){.ccards{grid-template-columns:repeat(3,1fr)}.kojp{grid-template-columns:1fr}.grid-2,.grid-3{grid-template-columns:1fr}}
@media (max-width:520px){.ccards{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">

  <header class="topbar">
    <div class="brand">
      <div class="brand-logo">✍️</div>
      <div><h1>콘텐츠 엔진</h1><p>블로그 · 뉴스레터 · 전자책 · 웹툰 · SNS · 한·일 동시 생성</p></div>
    </div>
    <div>
      <button class="tb-btn pri" onclick="location.href='../../index.html'">← 허브로 돌아가기</button>
    </div>
  </header>

  <div class="panel">
    <h3>1️⃣ 콘텐츠 유형 선택</h3>
    <div class="muted" style="margin-bottom:8px">유형을 고르면 아래 세부 옵션이 자동으로 바뀝니다.</div>
    <div class="ccards" id="ctype-cards"></div>
  </div>

  <div class="panel">
    <h3>2️⃣ 기본 입력</h3>
    <div class="grid-2">
      <div>
        <label>📝 주제</label>
        <input class="input" id="c-topic" placeholder="예: 제주도 2박3일 가족여행 후기">
      </div>
      <div>
        <label>👥 대상 독자</label>
        <input class="input" id="c-audience" placeholder="예: 30~40대 여성, 자녀와 여행 계획 중인 가족">
      </div>
    </div>
    <div class="grid-3" style="margin-top:10px">
      <div>
        <label>🎭 톤</label>
        <select class="select" id="c-tone">
          <option value="friendly">친근하게</option>
          <option value="expert">전문가처럼</option>
          <option value="emotional">감성적으로</option>
          <option value="persuasive">설득력 있게</option>
          <option value="easy" selected>쉽고 친절하게</option>
        </select>
      </div>
      <div>
        <label>📏 길이</label>
        <select class="select" id="c-length">
          <option value="short">짧게 (500자)</option>
          <option value="mid" selected>중간 (1,500자)</option>
          <option value="long">길게 (3,000자)</option>
          <option value="xl">초장문 (5,000자+)</option>
        </select>
      </div>
      <div>
        <label>🔑 핵심 키워드 (쉼표)</label>
        <input class="input" id="c-keywords" placeholder="예: 제주도, 카페, 아이동반">
      </div>
    </div>
    <div style="margin-top:10px">
      <label>🚫 피하고 싶은 표현 (선택)</label>
      <input class="input" id="c-avoid" placeholder="예: 광고 느낌, 과장된 표현">
    </div>
  </div>

  <div class="panel" id="sub-panel">
    <h3>3️⃣ 세부 옵션</h3>
    <div id="sub-body"></div>
  </div>

  <div class="panel">
    <div class="actions">
      <button class="btn pri" id="gen-btn" onclick="generate()">✨ AI로 생성 (한·일 동시)</button>
      <button class="btn" onclick="copyAll()">📋 전체 복사</button>
      <button class="btn sv" onclick="saveResult()">💾 저장</button>
      <button class="btn snd" onclick="sendToMedia()">🎬 미디어 엔진으로 전송</button>
    </div>
    <div class="status" id="status"></div>
    <div class="kojp">
      <div class="col">
        <h4>🇰🇷 한국어</h4>
        <textarea id="out-ko" readonly placeholder="생성된 한국어 콘텐츠가 여기에 표시됩니다."></textarea>
        <div class="actions" style="margin-top:6px">
          <button class="btn" onclick="copyOne('ko')">📋 한국어 복사</button>
        </div>
      </div>
      <div class="col jp">
        <h4>🇯🇵 日本語</h4>
        <textarea id="out-jp" readonly placeholder="生成された日本語コンテンツがここに表示されます。"></textarea>
        <div class="actions" style="margin-top:6px">
          <button class="btn" onclick="copyOne('jp')">📋 일본어 복사</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="../../config/providers.js"></script>
<script src="../../core/api-adapter.js"></script>
<script src="../../core/cost-tracker.js"></script>
<script src="../../core/intent-system.js"></script>
<script src="../../core/library-adapter.js"></script>

<script>
// 상단 AI 선택바 (공통 위젯)
document.addEventListener('DOMContentLoaded', function(){
  if (typeof APIAdapter !== 'undefined' && APIAdapter.mountAiBar){
    var holder = document.createElement('div');
    holder.id = 'engineAiBar';
    document.body.insertBefore(holder, document.body.firstChild);
    APIAdapter.mountAiBar(holder, { hint:'← 설정의 기본값 자동 적용 / 클릭으로 변경' });
  }
});
</script>

<script>
/* ═══════ 콘텐츠 유형 정의 ═══════ */
const CTYPES = [
  {id:'blog',       ico:'📝', title:'블로그',        desc:'네이버·브런치·티스토리',
    prompt:'블로그 포스팅. 제목 → 리드문 → 본문(H2·H3 구조) → 마무리 → 해시태그. SEO 친화.',
    options:[
      {k:'platform', label:'플랫폼', type:'select', values:[['naver','네이버 블로그'],['brunch','브런치'],['tistory','티스토리']]},
      {k:'style',    label:'스타일', type:'select', values:[['search','검색형(SEO)'],['info','정보형'],['emotion','감성형']]},
      {k:'hashtag',  label:'해시태그 개수', type:'select', values:[['5','5개'],['10','10개'],['15','15개']]}
    ]},
  {id:'newsletter', ico:'📧', title:'뉴스레터',      desc:'스티비·서브스택',
    prompt:'뉴스레터 1호. [헤드라인] → [리드] → [본문 3섹션] → [이번 주 추천] → [구독 유지 CTA]. 구독자 친화 톤.',
    options:[
      {k:'platform', label:'플랫폼', type:'select', values:[['stibee','스티비'],['substack','서브스택'],['mailchimp','메일침프']]},
      {k:'frequency',label:'발행 주기', type:'select', values:[['weekly','주 1회'],['biweekly','격주'],['monthly','월 1회']]},
      {k:'issue',    label:'호수', type:'input', placeholder:'예: 2025년 4월호, 12호'}
    ]},
  {id:'ebook',      ico:'📚', title:'전자책',        desc:'챕터 구조·실용서',
    prompt:'전자책 실용서. 먼저 7~10장 목차를 제시하고, 선택된 챕터 1개를 3,000자 분량으로 전개.',
    options:[
      {k:'genre', label:'장르', type:'select', values:[['howto','실용서·How-to'],['essay','에세이'],['business','자기계발/비즈니스'],['tech','기술서']]},
      {k:'chapter',label:'집중 전개할 챕터 번호', type:'input', placeholder:'예: 3'},
      {k:'toc',   label:'목차 먼저 보여주기', type:'select', values:[['yes','네'],['no','아니오']]}
    ]},
  {id:'webtoon',    ico:'🎨', title:'웹툰 대본',      desc:'컷 구성·대사',
    prompt:'웹툰 에피소드 1화. [컷 1~8] 형식으로 씬 설명 + 인물 대사 + 내레이션 구분. 이미지 프롬프트도 각 컷마다 포함.',
    options:[
      {k:'cuts',  label:'컷 수', type:'select', values:[['4','4컷'],['6','6컷'],['8','8컷 (권장)'],['12','12컷']]},
      {k:'genre', label:'장르', type:'select', values:[['romance','로맨스'],['comedy','코미디'],['thriller','스릴러'],['daily','일상']]},
      {k:'character',label:'주인공 설정', type:'input', placeholder:'예: 29세 직장인 여성, 고양이 좋아함'}
    ]},
  {id:'sns',        ico:'📱', title:'SNS 콘텐츠',     desc:'인스타·X·스레드',
    prompt:'SNS 콘텐츠. 플랫폼별 특성 반영(캡션·해시태그·이모지).',
    options:[
      {k:'platform', label:'플랫폼', type:'select', values:[['instagram','인스타그램'],['x','X(트위터)'],['threads','스레드'],['facebook','페이스북']]},
      {k:'format',   label:'포맷', type:'select', values:[['caption','단일 캡션'],['carousel','카루셀 (7장)'],['thread','스레드 (6개)']]},
      {k:'emoji',    label:'이모지 사용', type:'select', values:[['normal','보통'],['many','많이'],['none','없이']]}
    ]}
];

let STATE = { ctype:'blog', output:{ko:'', jp:''} };

/* ═══════ 렌더 ═══════ */
function renderCtypes(){
  const box = document.getElementById('ctype-cards');
  box.innerHTML = '';
  CTYPES.forEach(c => {
    const b = document.createElement('button');
    b.className = 'ccard' + (STATE.ctype===c.id?' on':'');
    b.innerHTML = `<span class="ico">${c.ico}</span><strong>${c.title}</strong><span>${c.desc}</span>`;
    b.onclick = () => { STATE.ctype = c.id; renderCtypes(); renderSub(); };
    box.appendChild(b);
  });
}

function renderSub(){
  const c = CTYPES.find(x => x.id === STATE.ctype);
  const body = document.getElementById('sub-body');
  const rows = c.options.map(opt => {
    if (opt.type === 'select') {
      return `<div>
        <label>${opt.label}</label>
        <select class="select" id="sub-${opt.k}">
          ${opt.values.map(([v,t]) => `<option value="${v}">${t}</option>`).join('')}
        </select>
      </div>`;
    }
    return `<div>
      <label>${opt.label}</label>
      <input class="input" id="sub-${opt.k}" placeholder="${opt.placeholder||''}">
    </div>`;
  }).join('');
  body.innerHTML = `<div class="grid-3">${rows}</div>`;
}

/* ═══════ 유틸 ═══════ */
function _v(id){ const e = document.getElementById(id); return e ? e.value : ''; }
async function _syncAPI(){
  if (typeof APIAdapter === 'undefined') throw new Error('api-adapter.js 미로드');
  var _ck=localStorage.getItem('uc_claude_key'); if(_ck) APIAdapter.setApiKey('claude',_ck);
  var _ok=localStorage.getItem('uc_openai_key'); if(_ok) APIAdapter.setApiKey('openai',_ok);
  var _gk=localStorage.getItem('uc_gemini_key'); if(_gk) APIAdapter.setApiKey('gemini',_gk);
}

/* ═══════ AI 생성 ═══════ */
async function generate(){
  const topic = _v('c-topic').trim();
  if (!topic) { alert('주제를 입력해주세요.'); return; }

  const c = CTYPES.find(x => x.id === STATE.ctype);
  const audience = _v('c-audience').trim();
  const tone = _v('c-tone');
  const length = _v('c-length');
  const keywords = _v('c-keywords').trim();
  const avoid = _v('c-avoid').trim();

  const subOpts = c.options.map(o => `${o.label}: ${_v('sub-'+o.k)}`).join(' / ');
  const styleLabel = {friendly:'친근하게',expert:'전문가처럼',emotional:'감성적으로',persuasive:'설득력 있게',easy:'쉽고 친절하게'}[tone];
  const lenLabel = {short:'500자 내외',mid:'1,500자 내외',long:'3,000자 내외',xl:'5,000자 이상'}[length];
  const maxTok = {short:1500, mid:3000, long:5000, xl:7000}[length];

  const baseSystem =
    '당신은 전문 콘텐츠 작가다.\n' +
    '유형: ' + c.title + '\n' +
    '규칙: ' + c.prompt + '\n' +
    '세부 옵션: ' + subOpts + '\n' +
    '문체: ' + styleLabel + ' / 길이: ' + lenLabel + '\n' +
    (audience ? '대상 독자: ' + audience + '\n' : '') +
    (keywords ? '핵심 키워드(자연스럽게 포함): ' + keywords + '\n' : '') +
    (avoid    ? '피해야 할 표현: ' + avoid + '\n' : '') +
    '허구의 수치·인용을 사실처럼 단정하지 말 것.';

  const btn = document.getElementById('gen-btn');
  const status = document.getElementById('status');
  const outKO = document.getElementById('out-ko');
  const outJP = document.getElementById('out-jp');
  btn.disabled = true; btn.textContent = '⏳ 생성 중...';
  status.textContent = '한국어와 일본어를 동시에 생성하고 있습니다...';
  outKO.value = ''; outJP.value = '';

  try {
    await _syncAPI();
    const sysKO = baseSystem + '\n[언어 지시] 반드시 한국어로만 작성.';
    const sysJP = baseSystem + '\n[言語指示] 必ず日本語のみで作成。自然な敬体で。';
    const user = '주제: ' + topic + '\n\n위 조건에 맞춰 바로 사용할 수 있는 최종 결과물을 작성해라.';

    const [r1, r2] = await Promise.allSettled([
      APIAdapter.callWithFallback(sysKO, user, {maxTokens:maxTok, featureId:'content-'+c.id+'-ko'}),
      APIAdapter.callWithFallback(sysJP, user, {maxTokens:maxTok, featureId:'content-'+c.id+'-jp'})
    ]);
    outKO.value = r1.status==='fulfilled' ? r1.value : '❌ ' + r1.reason.message;
    outJP.value = r2.status==='fulfilled' ? r2.value : '❌ ' + r2.reason.message;
    STATE.output = { ko: outKO.value, jp: outJP.value };
    status.textContent = '✅ 생성 완료';
  } catch (err) {
    status.textContent = '❌ ' + err.message;
  } finally {
    btn.disabled = false; btn.textContent = '✨ AI로 생성 (한·일 동시)';
  }
}

function copyOne(lang){
  const t = lang==='ko' ? document.getElementById('out-ko').value : document.getElementById('out-jp').value;
  if (!t) { alert('복사할 내용이 없습니다.'); return; }
  navigator.clipboard.writeText(t).then(() => {
    document.getElementById('status').textContent = '📋 ' + (lang==='ko'?'한국어':'일본어') + ' 복사됨';
  });
}
function copyAll(){
  const ko = document.getElementById('out-ko').value;
  const jp = document.getElementById('out-jp').value;
  if (!ko && !jp) { alert('복사할 내용이 없습니다.'); return; }
  const combined = '━━━ 🇰🇷 한국어 ━━━\n' + ko + '\n\n━━━ 🇯🇵 日本語 ━━━\n' + jp;
  navigator.clipboard.writeText(combined).then(() => {
    document.getElementById('status').textContent = '📋 전체 복사됨';
  });
}
function saveResult(){
  if (!STATE.output.ko && !STATE.output.jp) { alert('저장할 결과가 없습니다.'); return; }
  const key = 'uc_content_saved';
  const list = JSON.parse(localStorage.getItem(key)||'[]');
  list.unshift({
    at: Date.now(),
    ctype: STATE.ctype,
    topic: _v('c-topic'),
    ko: STATE.output.ko,
    jp: STATE.output.jp
  });
  localStorage.setItem(key, JSON.stringify(list.slice(0,50)));
  document.getElementById('status').textContent = '💾 저장됨 (최근 50개)';
}
function sendToMedia(){
  const ko = document.getElementById('out-ko').value;
  if (!ko) { alert('먼저 생성해주세요.'); return; }
  const list = JSON.parse(localStorage.getItem('hub_scripts_v1')||'[]');
  list.unshift({ source:'content', lang:'ko', text:ko, at:Date.now(), meta:{ctype:STATE.ctype} });
  localStorage.setItem('hub_scripts_v1', JSON.stringify(list.slice(0,30)));
  if (confirm('🎬 미디어 엔진으로 전송했습니다.\n\n음성·이미지·영상으로 만들어보시겠어요?')) {
    location.href = '../media/index.html?tab=oneclick';
  }
}

/* ═══════ 초기화 ═══════ */
renderCtypes();
renderSub();

// ?ctype=xxx URL 파라미터 지원
(function(){
  const m = location.search.match(/[?&]ctype=([^&]+)/);
  if (m) {
    const ct = decodeURIComponent(m[1]);
    if (CTYPES.find(x => x.id === ct)) { STATE.ctype = ct; renderCtypes(); renderSub(); }
  }
})();

console.log('✅ 콘텐츠 엔진 로드 완료');
</script>
