<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>내 보관함 — MOCA</title>
<link rel="stylesheet" href="../../shared/style.css">
<link rel="stylesheet" href="../../shared/ui.css">
</head>
<body>

<!-- ══ 내 보관함 ══ -->
<div id="libraryDetail" class="mz-detail">
          <div class="lib-wrap">
            <div class="lib-head">
              <div>
                <h2>📁 내 보관함</h2>
                <p>만든 것들을 여기서 다시 찾아요!</p>
              </div>
              <div class="hd-actions">
                <button class="lib-btn" onclick="libExportAll()">💾 전체 내보내기</button>
                <label class="lib-btn" style="display:inline-flex;align-items:center;gap:4px;cursor:pointer">
                  📥 불러오기
                  <input type="file" id="libImportFile" accept=".json" style="display:none" onchange="libImportFile(event)">
                </label>
              </div>
            </div>

            <div class="lib-stats" id="libStats"></div>
            <div class="lib-usage" id="libUsage"></div>

            <div class="lib-tabs" id="libTabs">
              <button class="lib-tab on" data-lt="recent"    onclick="libSwitch('recent',this)">📋 최근 결과</button>
              <button class="lib-tab"    data-lt="favorite"  onclick="libSwitch('favorite',this)">⭐ 즐겨찾기</button>
              <button class="lib-tab"    data-lt="project"   onclick="libSwitch('project',this)">📂 프로젝트</button>
              <button class="lib-tab"    data-lt="trash"     onclick="libSwitch('trash',this)">🗑 휴지통</button>
            </div>

            <!-- 최근 결과 -->
            <div id="libPanel-recent" class="lib-panel">
              <div class="lib-toolbar">
                <input class="lib-search" id="libSearch" placeholder="🔍 제목이나 키워드로 찾기" oninput="libRenderRecent()">
              </div>
              <div class="lib-toolbar" id="libFilters">
                <button class="lib-fil on" data-cat="all"      onclick="libSetCatFilter('all',this)">전체</button>
                <button class="lib-fil"    data-cat="script"   onclick="libSetCatFilter('script',this)">대본</button>
                <button class="lib-fil"    data-cat="trans"    onclick="libSetCatFilter('trans',this)">번역</button>
                <button class="lib-fil"    data-cat="blog"     onclick="libSetCatFilter('blog',this)">블로그</button>
                <button class="lib-fil"    data-cat="public"   onclick="libSetCatFilter('public',this)">공공기관</button>
                <button class="lib-fil"    data-cat="smb"      onclick="libSetCatFilter('smb',this)">소상공인</button>
                <span style="width:1px;height:22px;background:var(--line);margin:0 3px"></span>
                <button class="lib-fil" data-time="today"  onclick="libSetTimeFilter('today',this)">오늘</button>
                <button class="lib-fil" data-time="week"   onclick="libSetTimeFilter('week',this)">이번주</button>
                <button class="lib-fil" data-time="month"  onclick="libSetTimeFilter('month',this)">이번달</button>
                <div class="lib-sort">
                  정렬
                  <select id="libSort" onchange="libRenderRecent()">
                    <option value="new">최신순</option>
                    <option value="old">오래된순</option>
                    <option value="fav">즐겨찾기순</option>
                  </select>
                  <button class="lib-btn warn" onclick="libClearAll()" style="margin-left:6px">🗑 전체 삭제</button>
                </div>
              </div>
              <div class="lib-cards" id="libRecentCards"></div>
            </div>

            <!-- 즐겨찾기 -->
            <div id="libPanel-favorite" class="lib-panel" style="display:none">
              <div class="lib-cards" id="libFavCards"></div>
            </div>

            <!-- 프로젝트 -->
            <div id="libPanel-project" class="lib-panel" style="display:none">
              <div id="libProjList"></div>
              <div id="libProjOpen" style="display:none;margin-top:12px"></div>
              <button class="lib-btn pri" onclick="libToggleNewProj()" id="libNewProjBtn" style="margin-top:8px">+ 새 프로젝트 만들기</button>
              <div id="libNewProj" class="lib-newproj" style="display:none">
                <input id="npName" placeholder="프로젝트 이름 (예: 한국 시니어 채널)">
                <div style="font-size:11px;color:var(--sub);margin:4px 0 3px">채널 종류</div>
                <select id="npKind">
                  <option value="kr">🇰🇷 한국채널</option>
                  <option value="jp">🇯🇵 일본채널</option>
                  <option value="etc">🌍 기타</option>
                </select>
                <div style="font-size:11px;color:var(--sub);margin:4px 0 3px">이모지 선택</div>
                <div class="lib-emo-pick" id="npEmoPick">
                  <button type="button" class="on" data-e="🇰🇷">🇰🇷</button>
                  <button type="button" data-e="🇯🇵">🇯🇵</button>
                  <button type="button" data-e="🌍">🌍</button>
                  <button type="button" data-e="📺">📺</button>
                  <button type="button" data-e="🎬">🎬</button>
                  <button type="button" data-e="🎵">🎵</button>
                </div>
                <div style="font-size:11px;color:var(--sub);margin:4px 0 3px">색상 선택</div>
                <div class="lib-color-pick" id="npColorPick">
                  <button type="button" class="c-pink on"  data-c="pink"></button>
                  <button type="button" class="c-purple"   data-c="purple"></button>
                  <button type="button" class="c-blue"     data-c="blue"></button>
                  <button type="button" class="c-green"    data-c="green"></button>
                  <button type="button" class="c-orange"   data-c="orange"></button>
                </div>
                <textarea id="npMemo" rows="2" placeholder="메모 (선택)"></textarea>
                <div style="display:flex;gap:6px">
                  <button class="lib-btn pri" onclick="libCreateProject()">✅ 만들기</button>
                  <button class="lib-btn" onclick="libToggleNewProj()">취소</button>
                </div>
              </div>
            </div>

            <!-- 휴지통 -->
            <div id="libPanel-trash" class="lib-panel" style="display:none">
              <div class="lib-toolbar">
                <div style="flex:1;font-size:11px;color:var(--sub)">삭제한 것들이 여기 있어요 · 7일 뒤 자동 삭제</div>
                <button class="lib-btn warn" onclick="libTrashClear()">🗑 휴지통 비우기</button>
              </div>
              <div class="lib-cards" id="libTrashCards"></div>
            </div>
          </div>
        </div>

<script src="../../shared/ui.js"></script>
<script src="../../shared/api-settings.js"></script>
<script src="../../config/providers.js"></script>
<script src="../../core/api-adapter.js"></script>
<script src="../../core/cost-tracker.js"></script>
<script src="../../core/intent-system.js"></script>
<script src="../../core/library-adapter.js"></script>
  <script src="../../core/hub.js"></script>
  <script src="../../core/library.js"></script>
</body>
</html>
