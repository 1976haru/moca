<style>
  /* ───────────────────────────────────────────────
     standalone 페이지: 허브 CSS 의 .hide / opacity:0 / height:0 등
     영향을 모두 차단하고 콘텐츠가 항상 보이도록 강제
     ─────────────────────────────────────────────── */
  html, body { background:#fafafa; }
  body { margin:0; min-height:100vh; }
  main.vs-wrap {
    display:block !important;
    visibility:visible !important;
    opacity:1 !important;
    min-height:100vh;
    overflow:visible !important;
    padding:0;
  }
  /* 컨테이너 3종 — 어떤 클래스가 붙어도 무조건 표시 */
  #studioDetail,
  #studioDetail.hide,
  #studio-body,
  #studio-body.hide,
  #studioDashWrap,
  #studioS1Wrap,
  #studioS2Wrap,
  #studioS3SourceWrap,
  #studioS4EditWrap,
  #studioS5Wrap {
    display:block       !important;
    visibility:visible  !important;
    opacity:1           !important;
    overflow:visible    !important;
    height:auto         !important;
  }
  #studio-body {
    min-height:60vh;
    padding:18px 14px 60px;
    background:#fafafa;
  }
  /* 단계 모듈이 그려주는 루트 wrapper 들 — 가시성/배경/패딩 보강 */
  .dash-wrap,
  .s1-wrap,
  .s2-wrap,
  .s3src-wrap,
  .s4-wrap,
  .s5-wrap,
  .s5v-wrap {
    display:block      !important;
    visibility:visible !important;
    opacity:1          !important;
    overflow:visible   !important;
  }
  .dash-wrap {
    min-height:400px;
    padding:14px;
    background:#fff;
    border-radius:14px;
    box-shadow:0 1px 6px rgba(0,0,0,.04);
  }
  /* 모듈 로드 실패 안내 박스 */
  .studio-load-error{
    margin:30px auto; max-width:560px; padding:20px;
    background:#fff5f5; border:2px solid #fca5a5; border-radius:14px;
    color:#991b1b; font-family:inherit; line-height:1.6;
  }
  .studio-load-error h3{margin:0 0 8px;font-size:16px}
  .studio-load-error code{background:#fff;padding:2px 6px;border-radius:4px;font-size:12px}
  .studio-load-error ul{margin:8px 0 0;padding-left:20px;font-size:13px}
  .studio-load-error .hint{margin-top:10px;font-size:12px;color:#7c2d2d}
  /* 자동저장 표시 (선택) */
  #studio-savestate{position:fixed;top:8px;right:12px;font-size:11px;color:#9b8a93;
    background:#fff;border:1px solid #f1dce7;border-radius:20px;padding:3px 10px;
    pointer-events:none;opacity:0;transition:opacity .2s}
  #studio-savestate.show{opacity:1}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  /* 1) 필수 함수 존재 점검 (디버그) */
  var required = {
    _studioDashboard:   typeof _studioDashboard,
    _studioS1Step:      typeof _studioS1Step,
    _studioS3Source:    typeof _studioS3Source,
    _studioS2Step:      typeof _studioS2Step,
    _studioS4Edit:      typeof _studioS4Edit,
    _studioS5Upload:    typeof _studioS5Upload,
    renderStudio:       typeof renderStudio,
    studioGoto:         typeof studioGoto,
    studioNewProjectObj:typeof studioNewProjectObj,
  };
  if (typeof console !== 'undefined' && console.table) {
    console.table(required);
  }

  /* 2) 누락된 필수 함수가 있으면 화면에 안내 후 중단 */
  var FN_TO_FILE = {
    _studioDashboard:    'modules/studio/dashboard.js',
    _studioS1Step:       'modules/studio/s1-script-step.js',
    _studioS3Source:     'modules/studio/s3-source-tabs.js',
    _studioS2Step:       'modules/studio/s2-voice-step.js',
    _studioS4Edit:       'modules/studio/s4-edit.js',
    _studioS5Upload:     'modules/studio/s5-upload-v2.js',
    renderStudio:        'modules/studio/s1-script.js',
    studioGoto:          'modules/studio/s1-script.js',
    studioNewProjectObj: 'modules/studio/s1-script.js',
  };
  var missing = Object.keys(required).filter(function(k){
    return required[k] !== 'function';
  });
  if (missing.length) {
    var body = document.getElementById('studio-body');
    if (body) {
      body.innerHTML =
        '<div class="studio-load-error">' +
          '<h3>⚠️ 모듈 로드 실패</h3>' +
          '<p>다음 함수를 찾을 수 없어 화면을 그릴 수 없습니다:</p>' +
          '<ul>' +
            missing.map(function(m){
              var file = FN_TO_FILE[m] || '(unknown)';
              return '<li><code>'+m+'</code> → <code>'+file+'</code> 경로를 확인하세요.</li>';
            }).join('') +
          '</ul>' +
          '<p class="hint">F12 → Network 탭에서 위 파일들의 HTTP 상태(200 vs 404)를 확인하세요.</p>' +
        '</div>';
    }
    return;
  }

  /* 3) DOM 컨테이너 강제 표시 (.hide 클래스 잔존 대비) */
  ['studioDetail', 'studio-body'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) {
      el.classList.remove('hide');
      el.style.display = 'block';
      el.style.visibility = 'visible';
    }
  });

  /* 4) STUDIO 컨테이너 + project 초기화 + URL 파라미터(step/topic/genre) 적용 */
  if (!window.STUDIO) window.STUDIO = {};
  if (!window.STUDIO.project) {
    window.STUDIO.project = studioNewProjectObj();
  }
  /* URL 파라미터: ?step=0~5  &topic=...  &source=remix */
  var __params  = new URLSearchParams(location.search);
  var __rawStep = parseInt(__params.get('step'), 10);
  var __step    = (Number.isFinite(__rawStep) && __rawStep >= 0 && __rawStep <= 5) ? __rawStep : 0;
  var __topic   = (__params.get('topic') || '').trim();
  var __genre   = __params.get('genre');
  var __source  = __params.get('source');
  window.STUDIO.project.step = __step;
  if (__topic) {
    window.STUDIO.project.topic = __topic;
    if (!window.STUDIO.project.s1) window.STUDIO.project.s1 = {};
    window.STUDIO.project.s1.topic = __topic;
  }
  /* ⭐ 영상 리믹스 핸드오프 — ?source=remix 진입 시 localStorage payload 를 STUDIO.project 에 적용.
        반드시 renderStudio() 호출 전에 동기적으로 처리해야 첫 렌더에 씬이 표시됨. */
  if (__source === 'remix' && window.MOCA_REMIX_HANDOFF && typeof window.MOCA_REMIX_HANDOFF.apply === 'function') {
    try {
      var __handoff = window.MOCA_REMIX_HANDOFF.apply();
      if (__handoff && __handoff.ok) {
        console.log('[shorts] 영상 리믹스 핸드오프 적용 — 씬', __handoff.sceneCount, '개');
        /* step 강제 — handoff 는 step=2 를 셋팅하지만 URL ?step= 가 우선될 수 있어 다시 적용 */
        window.STUDIO.project.step = (__step >= 2 ? __step : 2);
      } else if (__handoff && !__handoff.skip) {
        console.warn('[shorts] 영상 리믹스 핸드오프 실패:', __handoff.reason);
      }
    } catch(e) { console.error('[shorts] 핸드오프 예외:', e && e.message); }
  }

  /* 5) 진입 — renderStudio() 우선, 없으면 openStudio(step) fallback */
  console.log('[shorts] renderStudio() 호출 — step=' + __step + ', topic=' + (__topic || '(없음)'));
  if (typeof renderStudio === 'function') {
    renderStudio();
  } else if (typeof openStudio === 'function') {
    openStudio(__step);
  }
  if (__genre && typeof wzOpen === 'function') wzOpen(__genre);

  /* 5-1) topic 자동 주입 — renderStudio 후 입력창이 생성된 뒤 한 번 더 시도 */
  if (__topic) {
    setTimeout(function(){
      var inp = document.getElementById('s1-topic')
             || document.getElementById('sc-topic')
             || document.getElementById('studio-topic')
             || document.querySelector('input[name="topic"]')
             || document.querySelector('textarea[name="topic"]')
             || document.querySelector('input[placeholder*="주제"]')
             || document.querySelector('textarea[placeholder*="주제"]');
      if (inp) {
        inp.value = __topic;
        inp.dispatchEvent(new Event('input',  { bubbles:true }));
        inp.dispatchEvent(new Event('change', { bubbles:true }));
        console.log('[shorts] topic 자동 입력 →', inp.id || inp.name || '(matched by selector)');
      } else {
        console.warn('[shorts] topic 입력창을 찾지 못했습니다 (현재 step=' + __step + ')');
      }
    }, 200);
  }

  /* 6) 렌더 진단 + 폴백 — studio-body 가 비어 있으면 직접 _studioDashboard 호출 */
  setTimeout(function(){
    var bodyEl    = document.getElementById('studio-body');
    var dashWrap  = document.getElementById('studioDashWrap');
    var dashInner = document.querySelector('.dash-wrap');

    console.group('[shorts] 렌더 진단');
    console.log('studioDetail   존재:', !!document.getElementById('studioDetail'));
    console.log('studio-body    존재:', !!bodyEl);
    console.log('studio-savestate 존재:', !!document.getElementById('studio-savestate'));
    console.log('studio-body innerHTML 길이:', bodyEl ? bodyEl.innerHTML.length : '(none)');
    console.log('studioDashWrap (renderStudio 결과):', !!dashWrap);
    console.log('.dash-wrap (_studioDashboard 결과):', !!dashInner);
    console.log('STUDIO.project.step:', window.STUDIO && window.STUDIO.project && window.STUDIO.project.step);
    console.groupEnd();

    /* 폴백: studio-body 자체가 비었으면 직접 대시보드 그리기 */
    if (bodyEl && !bodyEl.innerHTML.trim() && typeof _studioDashboard === 'function') {
      console.warn('[shorts] studio-body 비어있음 → _studioDashboard("studio-body") 직접 호출');
      _studioDashboard('studio-body');
    }
    /* 폴백: wrapper만 있고 dashboard 내용이 없으면 다시 호출 */
    else if (dashWrap && !dashInner && typeof _studioDashboard === 'function') {
      console.warn('[shorts] studioDashWrap 있으나 .dash-wrap 없음 → _studioDashboard("studioDashWrap") 재호출');
      _studioDashboard('studioDashWrap');
    }
  }, 50);
});
</script>
